<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アルコールチェック記録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f2;
    --card: #ffffff;
    --primary: #f26a00;
    --primary-mid: #ff8c2a;
    --primary-light: #fff0e3;
    --accent: #c0392b;
    --accent-light: #fdf0ef;
    --safe: #2e7d58;
    --safe-light: #eaf5ee;
    --confirmer: #1a7f7a;
    --confirmer-light: #e6f6f5;
    --warn: #e67e22;
    --text: #1c1107;
    --text-sub: #7a6a58;
    --border: #f0dcc8;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 2px 14px rgba(242,106,0,0.08);
    --shadow-lg: 0 8px 32px rgba(242,106,0,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 50px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 100%);
    padding: 22px 20px 18px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 3px 20px rgba(242,106,0,0.30);
  }
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; }
  .header-left h1 { font-size: 18px; font-weight: 800; color: white; letter-spacing: 0.02em; }
  .header-left .subtitle { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 3px; }
  .header-right { text-align: right; }
  .header-date { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.85); }
  .header-time { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: white; }

  /* SETUP BANNER */
  .setup-banner {
    background: #fff8e1;
    border-left: 4px solid var(--warn);
    padding: 12px 16px;
    margin: 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: #78350f;
  }
  .setup-banner strong { display: block; font-weight: 700; margin-bottom: 4px; }
  .setup-url-input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--warn);
    border-radius: 8px;
    font-size: 14px;
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    background: white;
    outline: none;
  }
  .btn-save-url {
    margin-top: 8px;
    padding: 10px 20px;
    background: var(--warn);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    width: 100%;
  }
  .url-ok { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--safe); font-weight: 600; padding: 8px 0; }

  /* MAIN */
  .main { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.1s; }
  .card:nth-child(4) { animation-delay: 0.15s; }

  .card-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .staff-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .staff-btn {
    padding: 12px 6px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .staff-btn.sel {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
    font-weight: 700;
    box-shadow: 0 3px 12px rgba(242,106,0,0.35);
    transform: scale(1.03);
  }
  .staff-btn-other {
    grid-column: span 3;
    background: white;
    border-style: dashed;
    color: var(--text-sub);
  }

  /* NUMBER INPUT */
  .num-input-wrap { display: flex; align-items: center; gap: 12px; }
  .num-input {
    width: 150px;
    padding: 14px;
    border: 2.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    text-align: center;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .num-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(242,106,0,0.12); }
  .num-unit { font-size: 15px; color: var(--text-sub); font-weight: 600; }

  /* JUDGE INDICATOR */
  .judge-indicator {
    margin-top: 14px;
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: none;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 15px;
    transition: all 0.3s;
  }
  .judge-indicator.show { display: flex; }
  .judge-indicator.safe { background: var(--safe-light); color: var(--safe); border: 2px solid rgba(27,122,74,0.2); }
  .judge-indicator.danger { background: var(--accent-light); color: var(--accent); border: 2px solid rgba(214,40,40,0.2); }
  .judge-big { font-size: 28px; }
  .judge-main { font-size: 16px; font-weight: 800; }
  .judge-sub { font-size: 12px; font-weight: 500; margin-top: 2px; opacity: 0.8; }

  /* CONFIRMATION — peer staff grid */
  .confirm-note {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .confirmer-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .confirmer-btn {
    padding: 12px 6px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .confirmer-btn.sel {
    border-color: var(--confirmer);
    background: var(--confirmer);
    color: white;
    font-weight: 700;
    box-shadow: 0 3px 12px rgba(26,127,122,0.32);
    transform: scale(1.03);
  }
  .confirmer-btn.disabled-btn {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }
  .confirmer-btn-other {
    grid-column: span 3;
    background: white;
    border-style: dashed;
    color: var(--text-sub);
  }

  /* SUBMIT */
  .btn-submit {
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 18px;
    font-weight: 800;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    letter-spacing: 0.04em;
    box-shadow: 0 6px 20px rgba(242,106,0,0.40);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-submit.sending::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-20deg);
    animation: shimmer 1s infinite;
  }
  @keyframes shimmer { to { left: 150%; } }

  /* SUCCESS STATE */
  .success-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,76,129,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .success-overlay.show { display: flex; }
  .success-card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    max-width: 340px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  .success-icon { font-size: 64px; margin-bottom: 16px; }
  .success-title { font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
  .success-name { font-size: 17px; font-weight: 500; color: var(--text-sub); margin-bottom: 24px; }
  .success-btn {
    padding: 14px 32px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 100px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* ERROR */
  .error-msg {
    background: var(--accent-light);
    border: 2px solid rgba(214,40,40,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    margin-top: 10px;
    display: none;
  }
  .error-msg.show { display: block; }

  @media (min-width: 480px) {
    .staff-grid { grid-template-columns: repeat(4, 1fr); }
    .staff-btn-other { grid-column: span 4; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div class="header-left">
      <h1>🚗 アルコールチェック</h1>
      <div class="subtitle">訪問看護ステーション笑福　安全運転管理記録</div>
    </div>
    <div class="header-right">
      <div class="header-date" id="hDate"></div>
      <div class="header-time" id="hTime"></div>
    </div>
  </div>
</div>

<!-- SETUP BANNER -->
<div class="setup-banner" id="setupBanner">
  <strong>⚙️ 初期設定：GoogleスプレッドシートのURLを登録してください</strong>
  GASデプロイ後に発行された「ウェブアプリのURL」を貼り付けてください。
  <input type="url" class="setup-url-input" id="gasUrlInput" placeholder="https://script.google.com/macros/s/...">
  <button class="btn-save-url" onclick="saveGasUrl()">✅ URLを保存して記録開始</button>
</div>

<div class="main">

  <!-- STEP 1: スタッフ選択 -->
  <div class="card">
    <div class="card-label">👤 Step 1　スタッフ選択</div>
    <div class="staff-grid" id="staffGrid"></div>
  </div>

  <!-- STEP 2: アルコール測定値 -->
  <div class="card">
    <div class="card-label">🍺 Step 2　測定値入力</div>
    <div class="num-input-wrap">
      <input type="number" class="num-input" id="alcoholVal"
        placeholder="0.00" min="0" max="2" step="0.01"
        inputmode="decimal" oninput="onAlcoholInput()">
      <div>
        <div class="num-unit">mg/L</div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">基準値 0.15</div>
      </div>
    </div>
    <div class="judge-indicator" id="judgeBox">
      <span class="judge-big" id="judgeIcon"></span>
      <div>
        <div class="judge-main" id="judgeMain"></div>
        <div class="judge-sub" id="judgeSub"></div>
      </div>
    </div>
  </div>

  <!-- STEP 3: 立会確認者選択 -->
  <div class="card">
    <div class="card-label">👥 Step 3　立会確認者</div>
    <div class="confirm-note">チェックを立会いした別スタッフを選んでください（本人以外）</div>
    <div class="confirmer-grid" id="confirmerGrid"></div>
  </div>

  <!-- SUBMIT -->
  <button class="btn-submit" id="submitBtn" onclick="submitRecord()">
    <span>📤</span> Googleスプレッドシートに記録する
  </button>
  <div class="error-msg" id="errorMsg"></div>

</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div class="success-icon">✅</div>
    <div class="success-title">記録完了！</div>
    <div class="success-name" id="successName"></div>
    <button class="success-btn" onclick="resetForm()">次のスタッフへ</button>
  </div>
</div>

<script>
// ===== 設定 =====
// ★ここにスタッフ名を入れてください（〜30名まで）
const STAFF_NAMES = [
  "山端二三子", "池田真由美", "星野佳世", "畔柳直起",
  "石﨑優香", "渋谷美奈子", "岡田紗希", "宮地成美",
  "竹内秀明", "奥田真弓", "磯村恵子", "黒田安佳里",
  "山端将大","山端真波",
];

const GAS_URL_KEY = 'gas_url_v1';
let selectedStaff = '';
let selectedConfirmer = '';
let gasUrl = localStorage.getItem(GAS_URL_KEY) || '';

// ===== 初期化 =====
function init() {
  updateClock();
  setInterval(updateClock, 1000);
  renderStaffGrid();
  if (gasUrl) {
    document.getElementById('setupBanner').style.display = 'none';
  } else {
    document.getElementById('gasUrlInput').value = gasUrl;
  }
}

function updateClock() {
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const p = n => String(n).padStart(2,'0');
  document.getElementById('hDate').textContent =
    `${now.getFullYear()}/${p(now.getMonth()+1)}/${p(now.getDate())}（${days[now.getDay()]}）`;
  document.getElementById('hTime').textContent =
    `${p(now.getHours())}:${p(now.getMinutes())}`;
}

function saveGasUrl() {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url.startsWith('https://script.google.com')) {
    alert('正しいGoogle Apps ScriptのURLを入力してください。');
    return;
  }
  gasUrl = url;
  localStorage.setItem(GAS_URL_KEY, gasUrl);
  document.getElementById('setupBanner').style.display = 'none';
}

// ===== スタッフグリッド =====
function renderStaffGrid() {
  const grid = document.getElementById('staffGrid');
  grid.innerHTML = STAFF_NAMES.map(name => `
    <button class="staff-btn ${selectedStaff === name ? 'sel' : ''}"
      onclick="selectStaff('${name}')">${name}</button>
  `).join('') + `
    <button class="staff-btn staff-btn-other" onclick="promptOther()">＋ その他</button>`;
  renderConfirmerGrid();
}

function selectStaff(name) {
  selectedStaff = name;
  if (selectedConfirmer === name) selectedConfirmer = '';
  renderStaffGrid();
}

function promptOther() {
  const n = prompt('スタッフ氏名を入力してください：');
  if (n && n.trim()) { selectedStaff = n.trim(); renderStaffGrid(); }
}

// ===== 立会確認者グリッド =====
function renderConfirmerGrid() {
  const grid = document.getElementById('confirmerGrid');
  if (!grid) return;
  // 全スタッフ ＋ selectedStaff以外のカスタム名
  const names = [...STAFF_NAMES];
  if (selectedStaff && !names.includes(selectedStaff)) names.push(selectedStaff);
  grid.innerHTML = names.map(name => {
    const isSelf = name === selectedStaff;
    const isSel  = name === selectedConfirmer;
    return `<button class="confirmer-btn ${isSel ? 'sel' : ''} ${isSelf ? 'disabled-btn' : ''}"
      onclick="selectConfirmer('${name}')">${name}</button>`;
  }).join('') + `
    <button class="confirmer-btn confirmer-btn-other" onclick="promptOtherConfirmer()">＋ その他</button>`;
}

function selectConfirmer(name) {
  if (name === selectedStaff) return;
  selectedConfirmer = name;
  renderConfirmerGrid();
}

function promptOtherConfirmer() {
  const n = prompt('立会確認者の氏名を入力してください：');
  if (n && n.trim()) { selectedConfirmer = n.trim(); renderConfirmerGrid(); }
}

// ===== アルコール判定 =====
function onAlcoholInput() {
  const val = parseFloat(document.getElementById('alcoholVal').value);
  const box = document.getElementById('judgeBox');
  if (isNaN(val) || document.getElementById('alcoholVal').value === '') {
    box.classList.remove('show','safe','danger'); return;
  }
  box.classList.add('show');
  if (val < 0.15) {
    box.className = 'judge-indicator show safe';
    document.getElementById('judgeIcon').textContent = '✅';
    document.getElementById('judgeMain').textContent = '異常なし — 乗務可能';
    document.getElementById('judgeSub').textContent = `測定値 ${val.toFixed(2)} mg/L（基準値 0.15 未満）`;
  } else {
    box.className = 'judge-indicator show danger';
    document.getElementById('judgeIcon').textContent = '🚫';
    document.getElementById('judgeMain').textContent = '基準値以上 — 乗務不可';
    document.getElementById('judgeSub').textContent = `測定値 ${val.toFixed(2)} mg/L（要対応・管理者へ報告）`;
  }
}

// ===== 送信 =====
async function submitRecord() {
  const alcohol = parseFloat(document.getElementById('alcoholVal').value);
  const errEl = document.getElementById('errorMsg');
  errEl.classList.remove('show');

  // バリデーション
  if (!selectedStaff) { showError('スタッフを選択してください'); return; }
  if (isNaN(alcohol) || document.getElementById('alcoholVal').value === '') {
    showError('測定値を入力してください'); return;
  }
  if (!selectedConfirmer) { showError('立会確認者を選択してください（本人以外）'); return; }
  if (!gasUrl) { showError('初期設定：Google Apps ScriptのURLを登録してください（ページ上部）'); return; }

  const now = new Date();
  const p = n => String(n).padStart(2,'0');
  const payload = {
    date: `${now.getFullYear()}/${p(now.getMonth()+1)}/${p(now.getDate())}`,
    time: `${p(now.getHours())}:${p(now.getMinutes())}`,
    dayOfWeek: ['日','月','火','水','木','金','土'][now.getDay()],
    staff: selectedStaff,
    alcoholValue: alcohol.toFixed(2),
    judge: alcohol < 0.15 ? '異常なし' : '要対応',
    confirmerName: selectedConfirmer,
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.classList.add('sending');
  btn.innerHTML = '<span>📡</span> 送信中...';

  try {
    await fetch(gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    showSuccess(selectedStaff, alcohol);
  } catch (e) {
    showError('送信に失敗しました。URLとネット接続を確認してください。');
  } finally {
    btn.disabled = false;
    btn.classList.remove('sending');
    btn.innerHTML = '<span>📤</span> Googleスプレッドシートに記録する';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
}

function showSuccess(name, val) {
  const judge = val < 0.15 ? '✅ 異常なし' : '🚫 要対応';
  document.getElementById('successName').textContent =
    `${name} さん  ${parseFloat(val).toFixed(2)} mg/L  ${judge}`;
  document.getElementById('successOverlay').classList.add('show');
}

function resetForm() {
  selectedStaff = '';
  selectedConfirmer = '';
  document.getElementById('alcoholVal').value = '';
  document.getElementById('judgeBox').className = 'judge-indicator';
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('successOverlay').classList.remove('show');
  renderStaffGrid();
  window.scrollTo(0, 0);
}

init();
</script>
</body>
</html>
